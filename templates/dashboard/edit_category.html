{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <!-- Left Sidebar -->
    <!-- load the sidebar here -->
    {% include  'dashboard/sidebar.html'%}

    <!-- Right Sidebar -->
    <div class="col-md-9">
        <h2> Edit Category </h2>
        <form action="{% url 'edit_category' Category.id %}" method="POST" style="width:500px;">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning">Submit</button>
            <br>
        </form>
    </div>
</div>
{% endblock %}
