{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <!-- Left Sidebar -->
    <!-- load the sidebar here -->
    {% include  'dashboard/sidebar.html' %}

    <!-- Right Sidebar -->
    <div class="col-md-9">
        {% if perms.auth.view_user %}
        <h2> Edit User </h2>
        <form action="" method="POST">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
        {% else %}
        <h5 class="text-center">You don't have permissions view this page</h5>
        {% endif %}
    </div>
</div>
{% endblock %}
